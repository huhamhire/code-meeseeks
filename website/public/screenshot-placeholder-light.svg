<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Code Meeseeks UI preview placeholder" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="760" rx="12"/></clipPath>
  </defs>

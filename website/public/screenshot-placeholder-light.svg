    <circle cx="68" cy="20" r="6" fill="#28c840"/>
    <text x="600" y="25" text-anchor="middle" fill="#616161" font-size="13">Code Meeseeks — feat/awesome-change · #1024</text>

    <!-- sidebar: PR list -->
    <rect x="0" y="40" width="300" height="720" fill="#f3f3f3"/>
    <rect x="16" y="60" width="120" height="12" rx="6" fill="#d0d0d0"/>
    <g fill="#e4eefb">
      <rect x="12" y="92" width="276" height="60" rx="6"/>
    </g>
    <rect x="12" y="92" width="3" height="60" fill="#005fb8"/>
    <rect x="28" y="106" width="180" height="10" rx="5" fill="#333333"/>

      <rect x="28" y="236" width="210" height="10" rx="5"/>
      <rect x="28" y="256" width="110" height="8" rx="4" opacity="0.6"/>
      <rect x="28" y="296" width="190" height="10" rx="5"/>
      <rect x="28" y="316" width="130" height="8" rx="4" opacity="0.6"/>

    <rect x="316" y="49" width="140" height="12" rx="6" fill="#d0d0d0"/>
    <!-- gutter numbers -->
    <rect x="300" y="72" width="40" height="688" fill="#ffffff"/>
    <!-- left / right split -->
    <line x1="750" y1="72" x2="750" y2="760" stroke="#e0e0e0" stroke-width="1"/>
    <!-- code lines: removed (red) / added (green) / neutral -->
    <g>
      <rect x="352" y="96"  width="330" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="352" y="120" width="270" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="340" y="144" width="410" height="20"          fill="#e5534b" opacity="0.16"/>
      <rect x="352" y="149" width="300" height="10" rx="5" fill="#b31d28"/>
      <rect x="352" y="180" width="240" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="352" y="204" width="360" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="762" y="96"  width="330" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="762" y="120" width="270" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="760" y="144" width="430" height="20"          fill="#2da44e" opacity="0.16"/>
      <rect x="772" y="149" width="320" height="10" rx="5" fill="#1a7f37"/>
      <rect x="762" y="180" width="240" height="10" rx="5" fill="#9a9a9a"/>
      <rect x="762" y="204" width="360" height="10" rx="5" fill="#9a9a9a"/>
    </g>


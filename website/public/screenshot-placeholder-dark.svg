    <rect x="360" y="250" width="760" height="120" rx="8" fill="#252526" stroke="#3e3e42"/>
    <circle cx="392" cy="284" r="14" fill="#0e639c"/>
    <text x="392" y="289" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">M</text>
    <rect x="420" y="270" width="160" height="10" rx="5" fill="#cccccc"/>
    <rect x="420" y="296" width="660" height="9" rx="4.5" fill="#858585"/>
    <rect x="420" y="316" width="600" height="9" rx="4.5" fill="#858585"/>
    <rect x="420" y="336" width="120" height="22" rx="6" fill="#0e639c"/>
    <rect x="552" y="336" width="120" height="22" rx="6" fill="#2d2d30" stroke="#3e3e42"/>

    <!-- border -->
    <rect x="0.5" y="0.5" width="1199" height="759" rx="12" fill="none" stroke="#3e3e42"/>

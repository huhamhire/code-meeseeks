    <!-- diff panes -->
    <rect x="300" y="40" width="900" height="32" fill="#252526"/>
    <rect x="316" y="49" width="140" height="12" rx="6" fill="#3e3e42"/>
    <!-- gutter numbers -->
    <rect x="300" y="72" width="40" height="688" fill="#1e1e1e"/>
    <!-- left / right split -->
    <line x1="750" y1="72" x2="750" y2="760" stroke="#3e3e42" stroke-width="1"/>
    <!-- code lines: removed (red) / added (green) / neutral -->
    <g>
      <rect x="352" y="96"  width="330" height="10" rx="5" fill="#858585"/>
      <rect x="352" y="120" width="270" height="10" rx="5" fill="#858585"/>
      <rect x="340" y="144" width="410" height="20"          fill="#c74e39" opacity="0.22"/>
      <rect x="352" y="149" width="300" height="10" rx="5" fill="#f48771"/>
      <rect x="352" y="180" width="240" height="10" rx="5" fill="#858585"/>
      <rect x="352" y="204" width="360" height="10" rx="5" fill="#858585"/>
      <rect x="762" y="96"  width="330" height="10" rx="5" fill="#858585"/>
      <rect x="762" y="120" width="270" height="10" rx="5" fill="#858585"/>
      <rect x="760" y="144" width="430" height="20"          fill="#73c991" opacity="0.20"/>
      <rect x="772" y="149" width="320" height="10" rx="5" fill="#73c991"/>
      <rect x="762" y="180" width="240" height="10" rx="5" fill="#858585"/>
      <rect x="762" y="204" width="360" height="10" rx="5" fill="#858585"/>
    </g>


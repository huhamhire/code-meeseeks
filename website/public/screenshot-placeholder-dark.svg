    <circle cx="46" cy="20" r="6" fill="#febc2e"/>
    <circle cx="68" cy="20" r="6" fill="#28c840"/>
    <text x="600" y="25" text-anchor="middle" fill="#858585" font-size="13">Code Meeseeks — feat/awesome-change · #1024</text>

    <!-- sidebar: PR list -->
    <rect x="0" y="40" width="300" height="720" fill="#1f1f20"/>
    <rect x="16" y="60" width="120" height="12" rx="6" fill="#3e3e42"/>
    <g fill="#2a2d2e">
      <rect x="12" y="92" width="276" height="60" rx="6"/>
    </g>
    <rect x="12" y="92" width="3" height="60" fill="#0e639c"/>
    <rect x="28" y="106" width="180" height="10" rx="5" fill="#cccccc"/>

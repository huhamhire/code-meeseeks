# 发布 workflow —— tag 触发，自动出 Windows + macOS(arm64) 安装包并挂到 GitHub Release。
#
# 免费路线（当前）：仓库无 Apple 签名 secrets → mac 包由 afterPack 做 ad-hoc 签名
# （arm64 能跑，含嵌入式 python），但不公证，用户首次需"仍要打开"。见 docs/mac-build.md。
#
# 升级到公证（将来有 Apple Developer ID）：把下列 secrets 配进仓库即可，workflow 不用改——
# afterPack 检测到凭据会自动让位给 electron-builder 的正式签名 + 公证：
#   MAC_CSC_LINK            Developer ID 证书 .p12 的 base64
#   MAC_CSC_KEY_PASSWORD    .p12 密码
#   APPLE_API_KEY           App Store Connect API key .p8 的 base64（或路径）
#   APPLE_API_KEY_ID / APPLE_API_ISSUER
# 并在 electron-builder.yml mac 段加 hardenedRuntime / entitlements / notarize。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write # 创建 Release + 上传产物

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifacts: apps/desktop/release/*.exe
          - os: macos-14 # arm64 runner，原生构建 mac arm64
            artifacts: apps/desktop/release/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # 拉 LFS 图标（assets/icons/icon.ico 等），否则只是指针 → 构建失败

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      # 有 Apple 凭据时才提升为签名 env（走正式签名 + 公证）；没有则一个都不设。
      # 关键：不能把缺失的 secret 直接挂到 env —— 那样 CSC_LINK 会变成空串 ""，
      # electron-builder 会把它当证书路径解析成 projectDir(apps/desktop) → "not a file" 报错。
      # 无凭据时交给 afterPack 做 ad-hoc 签名（见文件头注释 + after-pack.cjs）。
      - name: 准备 mac 签名凭据
        if: runner.os == 'macOS'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_API_KEY=$APPLE_API_KEY"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            } >> "$GITHUB_ENV"
            echo "检测到 Apple 凭据 → 正式签名 + 公证"
          else
            echo "无 Apple 凭据 → afterPack ad-hoc 签名（免费路线）"
          fi

      - name: 构建 + 出包
        shell: bash # win/mac 统一用 bash，保证多行命令 fail-fast
        working-directory: apps/desktop
        run: |
          npm run prepare:pragent   # 组装当前平台的嵌入式 pr-agent 运行时
          npm run build             # electron-vite build
          npm run notices           # 生成第三方声明，供 electron-builder 打入包
          npx electron-builder --publish never
        env:
          # 无 CSC_LINK 时禁止 electron-builder 去钥匙串自动找签名身份（afterPack 已 ad-hoc）；
          # 有真证书时走 CSC_LINK 导入签名，不受此项影响。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # prepare:pragent 调 GitHub API 列 python-build-standalone release 资产；匿名 60 次/h/IP
          # 易被限流（HTTP 403）。带上 Actions 自带 token 提到认证额度（脚本已支持 GITHUB_TOKEN）。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 SHA256 校验和
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: apps/desktop/release
        run: |
          shopt -s nullglob
          for f in *.exe *.dmg; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      # 组装 Release 正文：把 CHANGELOG 里对应版本的段落注入 RELEASE_NOTES 的占位，
      # 让 Release 页直接看到本版变更，而不是只给一个链接。找不到对应段落则回退用原说明。
      - name: 组装 Release 说明
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # 抽取 `## [VERSION] ...` 到下一个 `## [` 之间的正文（index==1 做字面前缀匹配，避开正则元字符）
          awk -v ver="## [$VERSION]" 'index($0,ver)==1{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md > changelog-section.md
          if [ -s changelog-section.md ]; then
            awk 'FNR==NR{a[++n]=$0;next} /%%CHANGELOG_SECTION%%/{for(i=1;i<=n;i++)print a[i];next} {print}' \
              changelog-section.md .github/RELEASE_NOTES.md > RELEASE_BODY.md
          else
            echo "::warning::CHANGELOG 未找到 [$VERSION] 段，Release 正文回退用 RELEASE_NOTES.md 原文"
            sed 's/%%CHANGELOG_SECTION%%//' .github/RELEASE_NOTES.md > RELEASE_BODY.md
          fi

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifacts }}
            ${{ matrix.artifacts }}.sha256
          fail_on_unmatched_files: true
          # alpha / 任何带 - 的预发布 tag（如 v0.1.0-alpha.1）→ 标为 prerelease，且不抢占 Latest
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          # 正文 = RELEASE_NOTES（安装 / 首次打开 / 校验和）+ 注入的本版 CHANGELOG 段
          body_path: RELEASE_BODY.md

  # meebox CLI（cli/，独立 Go module）：纯 Go、无 CGO → 单 runner 交叉编译全平台。出四平台压缩包 +
  # 校验和，随桌面安装包挂到同一个 GitHub Release（不打进安装包，是独立可分发物）。仅 tag 触发上传；
  # workflow_dispatch 仍构建做编译冒烟、不上传。本 job 不设 Release 正文（由 build job 注入），仅追加产物。
  cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: '.exe', archive: zip }
          - { goos: darwin, goarch: arm64, ext: '', archive: zip }
          - { goos: linux, goarch: amd64, ext: '', archive: tar.gz }
          - { goos: linux, goarch: arm64, ext: '', archive: tar.gz }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: 交叉编译 meebox CLI
        shell: bash
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # tag 去 v 前缀；非 tag（dispatch）取 ref 名，仅用于编译冒烟
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/huhamhire/code-meeseeks/cli/cmd.version=${VERSION}" \
            -o "dist/meebox${{ matrix.ext }}" .

      - name: 打包压缩包 + 校验和
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: cli/dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="meebox${{ matrix.ext }}"
          ARCHIVE="meebox-cli-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          # Bundle LICENSE + README + SKILL.md so the archive is a drop-in agent skill
          # directory (unzip into a skills dir → SKILL.md beside the binary it drives).
          cp ../../LICENSE ../README.md ../SKILL.md .
          FILES=("${BIN}" LICENSE README.md SKILL.md)
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -q "${ARCHIVE}.zip" "${FILES[@]}"
          else
            tar -czf "${ARCHIVE}.tar.gz" "${FILES[@]}"
          fi
          for f in "${ARCHIVE}".zip "${ARCHIVE}".tar.gz; do
            [ -e "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # 本 matrix 项仅产出自身的压缩包 + .sha256（fresh runner）；不设 body_path 以免覆盖 build job 注入的正文
          files: cli/dist/meebox-cli-*
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}

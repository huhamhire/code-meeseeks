# Release workflow — tag-triggered, automatically builds Windows + macOS(arm64) installers and attaches them to a GitHub Release.
#
# Free route (current): repo has no Apple signing secrets → mac package is ad-hoc signed by afterPack
# (runs on arm64, includes embedded python), but not notarized, so users need "Open anyway" on first launch. See docs/mac-build.md.
#
# Upgrading to notarization (once an Apple Developer ID is available): just configure the following secrets in the repo, no workflow change needed —
# on detecting credentials afterPack yields to electron-builder's proper signing + notarization:
#   MAC_CSC_LINK            base64 of the Developer ID certificate .p12
#   MAC_CSC_KEY_PASSWORD    .p12 password
#   APPLE_API_KEY           base64 (or path) of the App Store Connect API key .p8
#   APPLE_API_KEY_ID / APPLE_API_ISSUER
# and add hardenedRuntime / entitlements / notarize to the mac section of electron-builder.yml.
#
# Release is **two-stage**: the gui / cli matrix jobs only build and upload their artifacts as workflow artifacts; a final single
# release job aggregates the downloads + assembles the body + uploads to the Release in one shot. Previously each job called softprops directly, and multiple jobs
# concurrently creating / finalizing the Release for the same tag hit an `already_exists` race — a single publish point eliminates it.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write # create Release + upload artifacts

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifacts: apps/desktop/release/*.exe
          - os: macos-14 # arm64 runner, natively builds mac arm64
            artifacts: apps/desktop/release/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # pull LFS icons (assets/icons/icon.ico etc.), otherwise they are just pointers → build failure

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only promote to signing env when Apple credentials are present (proper signing + notarization); otherwise set none.
      # Key point: do not attach a missing secret straight to env — that turns CSC_LINK into an empty string "",
      # and electron-builder resolves it as a certificate path relative to projectDir(apps/desktop) → "not a file" error.
      # Without credentials, hand off to afterPack for ad-hoc signing (see file-header comment + after-pack.cjs).
      - name: Prepare mac signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_API_KEY=$APPLE_API_KEY"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            } >> "$GITHUB_ENV"
            echo "Apple credentials detected → proper signing + notarization"
          else
            echo "No Apple credentials → afterPack ad-hoc signing (free route)"
          fi

      - name: Build + package
        shell: bash # use bash on both win/mac to guarantee fail-fast on multi-line commands
        working-directory: apps/desktop
        run: |
          npm run prepare:pragent   # assemble the embedded pr-agent runtime for the current platform
          npm run build             # electron-vite build
          npm run notices           # generate third-party notices for electron-builder to bundle
          npx electron-builder --publish never
        env:
          # Without CSC_LINK, forbid electron-builder from auto-finding a signing identity in the keychain (afterPack already did ad-hoc);
          # with a real certificate, CSC_LINK imports the signature and this setting has no effect.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # prepare:pragent calls the GitHub API to list python-build-standalone release assets; anonymous 60/h/IP
          # is easily rate-limited (HTTP 403). Pass the Actions-provided token to raise it to the authenticated quota (the script supports GITHUB_TOKEN).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: apps/desktop/release
        run: |
          shopt -s nullglob
          for f in *.exe *.dmg; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      # Upload installers + checksums as workflow artifacts, leaving the final release job as the single publish point (no direct Release upload here).
      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.os }}
          path: |
            ${{ matrix.artifacts }}
            ${{ matrix.artifacts }}.sha256
          if-no-files-found: error
          retention-days: 1

  # meebox CLI (cli/, standalone Go module): pure Go, no CGO → cross-compile all platforms on a single runner. Produces four-platform archives +
  # checksums, attached alongside the desktop installers to the same GitHub Release (not bundled into the installer, a separate distributable). Likewise only uploaded as an artifact,
  # published by the final release job as the single point; workflow_dispatch still builds as a compile smoke test but does not upload (no tag).
  cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: '.exe', archive: zip }
          - { goos: darwin, goarch: arm64, ext: '', archive: zip }
          - { goos: linux, goarch: amd64, ext: '', archive: tar.gz }
          - { goos: linux, goarch: arm64, ext: '', archive: tar.gz }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # Declare node explicitly: the version is read from apps/desktop/package.json (via `node -p`), not relying on the runner's implicit node.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cross-compile meebox CLI
        shell: bash
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          # Version shares the app's source: taken from apps/desktop/package.json (the single source of truth for the app's runtime version),
          # rather than independently relying on the git tag — release prechecks already verified tag == that version, so they agree but there is only one source.
          VERSION="$(node -p "require('$GITHUB_WORKSPACE/apps/desktop/package.json').version")"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/huhamhire/code-meeseeks/cli/cmd.version=${VERSION}" \
            -o "dist/meebox${{ matrix.ext }}" .

      - name: Package archive + checksum
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: cli/dist
        run: |
          VERSION="$(node -p "require('$GITHUB_WORKSPACE/apps/desktop/package.json').version")"  # shares the app's source
          BIN="meebox${{ matrix.ext }}"
          ARCHIVE="meebox-cli-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}"
          # Bundle LICENSE + README + SKILL.md so the archive is a drop-in agent skill
          # directory (unzip into a skills dir → SKILL.md beside the binary it drives).
          cp ../../LICENSE ../README.md ../SKILL.md .
          FILES=("${BIN}" LICENSE README.md SKILL.md)
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -q "${ARCHIVE}" "${FILES[@]}"
          else
            tar -czf "${ARCHIVE}" "${FILES[@]}"
          fi
          # Checksum only the one archive this matrix actually produced. Previously it iterated both .zip/.tar.gz extensions: for the zip variants
          # (windows/mac) the last round `[ -e X.tar.gz ]` was false and returned 1, and being the step's final command → the whole step exited 1 and failed;
          # only linux (.tar.gz matched on the last round) escaped. Compute sha256 on the known filename directly, dropping this fragile loop.
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      # Upload archive + checksum as workflow artifacts (glob takes only meebox-cli-*, excluding the bare binary and bundled LICENSE etc. in dist).
      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/meebox-cli-*
          if-no-files-found: error
          retention-days: 1

  # Single publish point: once all build artifacts are ready, one job aggregates downloads + assembles the body + uploads to the Release in one shot. Avoids multiple
  # matrix jobs concurrently creating / finalizing the Release for the same tag triggering an `already_exists` race. Tag-triggered only.
  release:
    needs: [gui, cli]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # fetch CHANGELOG / RELEASE_NOTES (for body assembly); no LFS needed

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # merge each job's artifacts flat into dist/ (filenames are all distinct, no conflicts)

      # Assemble the Release body: inject the CHANGELOG section for the matching version into the placeholder in RELEASE_NOTES,
      # so the Release page shows this version's changes directly instead of just a link. If no matching section is found, fall back to the original notes.
      # Source is the English canonical CHANGELOG.md (RELEASE_NOTES.md is English too, so the Release body is single-language English);
      # the bilingual venue is the website changelog (https://huhamhire.github.io/code-meeseeks/changelog), linked from RELEASE_NOTES.md.
      - name: Assemble Release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Deep-link to this version on the website changelog, per language. The anchor is stable and
          # date-independent: sync-docs.mjs injects `{#v<version, dots→hyphens>}` on both locales' pages;
          # build the same slug here from the tag. EN is the root locale, ZH lives under /zh/.
          SLUG="v$(echo "$VERSION" | tr '.' '-')"
          CHANGELOG_EN="https://huhamhire.github.io/code-meeseeks/changelog#${SLUG}"
          CHANGELOG_ZH="https://huhamhire.github.io/code-meeseeks/zh/changelog#${SLUG}"
          # Extract the body between `## [VERSION] ...` and the next `## [` (index==1 does a literal prefix match, avoiding regex metacharacters)
          awk -v ver="## [$VERSION]" 'index($0,ver)==1{f=1;next} f&&/^## \[/{exit} f{print}' CHANGELOG.md > changelog-section.md
          if [ -s changelog-section.md ]; then
            awk 'FNR==NR{a[++n]=$0;next} /%%CHANGELOG_SECTION%%/{for(i=1;i<=n;i++)print a[i];next} {print}' \
              changelog-section.md .github/RELEASE_NOTES.md > RELEASE_BODY.tmp
          else
            echo "::warning::CHANGELOG.md has no [$VERSION] section, Release body falls back to the original RELEASE_NOTES.md"
            sed 's/%%CHANGELOG_SECTION%%//' .github/RELEASE_NOTES.md > RELEASE_BODY.tmp
          fi
          # Fill the per-language version deep-links (use | as the sed delimiter — the URLs contain slashes)
          sed -e "s|%%CHANGELOG_URL_EN%%|${CHANGELOG_EN}|" -e "s|%%CHANGELOG_URL_ZH%%|${CHANGELOG_ZH}|" \
            RELEASE_BODY.tmp > RELEASE_BODY.md

      - name: Upload to Release (single point)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          # alpha / any prerelease tag with a - (e.g. v0.1.0-alpha.1) → marked prerelease, and does not claim Latest
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          # body = RELEASE_NOTES (install / first open / checksums) + the injected CHANGELOG section for this version
          body_path: RELEASE_BODY.md

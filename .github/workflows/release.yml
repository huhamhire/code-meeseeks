# 发布 workflow —— tag 触发，自动出 Windows + macOS(arm64) 安装包并挂到 GitHub Release。
#
# 免费路线（当前）：仓库无 Apple 签名 secrets → mac 包由 afterPack 做 ad-hoc 签名
# （arm64 能跑，含嵌入式 python），但不公证，用户首次需"仍要打开"。见 docs/mac-build.md。
#
# 升级到公证（将来有 Apple Developer ID）：把下列 secrets 配进仓库即可，workflow 不用改——
# afterPack 检测到凭据会自动让位给 electron-builder 的正式签名 + 公证：
#   MAC_CSC_LINK            Developer ID 证书 .p12 的 base64
#   MAC_CSC_KEY_PASSWORD    .p12 密码
#   APPLE_API_KEY           App Store Connect API key .p8 的 base64（或路径）
#   APPLE_API_KEY_ID / APPLE_API_ISSUER
# 并在 electron-builder.yml mac 段加 hardenedRuntime / entitlements / notarize。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write # 创建 Release + 上传产物

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifacts: apps/desktop/release/*.exe
          - os: macos-14 # arm64 runner，原生构建 mac arm64
            artifacts: apps/desktop/release/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # 拉 LFS 图标（assets/icons/icon.ico 等），否则只是指针 → 构建失败

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安装依赖
        run: npm ci

      # 有 Apple 凭据时才提升为签名 env（走正式签名 + 公证）；没有则一个都不设。
      # 关键：不能把缺失的 secret 直接挂到 env —— 那样 CSC_LINK 会变成空串 ""，
      # electron-builder 会把它当证书路径解析成 projectDir(apps/desktop) → "not a file" 报错。
      # 无凭据时交给 afterPack 做 ad-hoc 签名（见文件头注释 + after-pack.cjs）。
      - name: 准备 mac 签名凭据
        if: runner.os == 'macOS'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_API_KEY=$APPLE_API_KEY"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            } >> "$GITHUB_ENV"
            echo "检测到 Apple 凭据 → 正式签名 + 公证"
          else
            echo "无 Apple 凭据 → afterPack ad-hoc 签名（免费路线）"
          fi

      - name: 构建 + 出包
        shell: bash # win/mac 统一用 bash，保证多行命令 fail-fast
        working-directory: apps/desktop
        run: |
          npm run prepare:pragent   # 组装当前平台的嵌入式 pr-agent 运行时
          npm run build             # electron-vite build
          npm run notices           # 生成第三方声明，供 electron-builder 打入包
          npx electron-builder --publish never
        env:
          # 无 CSC_LINK 时禁止 electron-builder 去钥匙串自动找签名身份（afterPack 已 ad-hoc）；
          # 有真证书时走 CSC_LINK 导入签名，不受此项影响。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # prepare:pragent 调 GitHub API 列 python-build-standalone release 资产；匿名 60 次/h/IP
          # 易被限流（HTTP 403）。带上 Actions 自带 token 提到认证额度（脚本已支持 GITHUB_TOKEN）。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 SHA256 校验和
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: apps/desktop/release
        run: |
          shopt -s nullglob
          for f in *.exe *.dmg; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifacts }}
            ${{ matrix.artifacts }}.sha256
          fail_on_unmatched_files: true
          # alpha / 任何带 - 的预发布 tag（如 v0.1.0-alpha.1）→ 标为 prerelease，且不抢占 Latest
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          # 安装 / 首次打开（Gatekeeper/SmartScreen）/ 校验和说明；完整变更指向 CHANGELOG
          body_path: .github/RELEASE_NOTES.md
